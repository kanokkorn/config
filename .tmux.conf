#keep it minimal, no need for plug-in
# favorite colour
set -g default-terminal "screen-256color"
set -g status-style "bg=colour235 fg=colour245"
#set -g pane-active-border-style "fg=colour250 bg=default"
set -g pane-border-style "fg=colour235"
set -g pane-active-border-style "fg=colour238"
set -g window-status-current-style "fg=colour0 bg=colour48"
# set -g status-right " | %a %h-%d | %H:%M" 
set -g status-right "| #(ip route get 1 2>/dev/null | awk '{print \$7}' | head -n1 | xargs -I {} echo '{}' || echo 'disconnect') | %a %h-%d | %H:%M " 

# convenience pane resizing & movement
set -g mouse on
set -g set-clipboard external
set -g status-keys vi
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# spawn superfile popup, make sure to install first
bind C-f display-popup -d "#{pane_current_path}" -w 75% -h 75% -E "spf"

# spawn ipython popup, make sure to install first
bind C-p display-popup -d "#{pane_current_path}" -w 75% -h 75% -E "ipython"

# default shell
set -g default-shell /bin/bash

# spare key
bind-key "S" run-shell ""

# reload setting
unbind r
bind r source-file ~/.tmux.conf
